<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Can Your AI Survive Audit?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

<div class="container py-5">
  <h1 class="text-center mb-4">Can Your AI Survive an Audit?</h1>

  <form id="auditForm">

    <!-- Questions -->
    <div class="mb-3">
      <label>1. Can you replay a decision exactly?</label>
      <select class="form-select" id="replay">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <div class="mb-3">
      <label>2. Same input always gives same output?</label>
      <select class="form-select" id="determinism">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <div class="mb-3">
      <label>3. Is decision ownership clearly defined?</label>
      <select class="form-select" id="ownership">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <div class="mb-3">
      <label>4. Are authority boundaries enforced?</label>
      <select class="form-select" id="boundary">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <div class="mb-3">
      <label>5. Does failure keep system state safe?</label>
      <select class="form-select" id="failure">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <div class="mb-3">
      <label>6. Same request executes only once?</label>
      <select class="form-select" id="idempotency">
        <option value="YES">Yes</option>
        <option value="PARTIAL">Partial</option>
        <option value="NO">No</option>
      </select>
    </div>

    <button type="button" class="btn btn-primary w-100 mt-3" onclick="evaluate()">Evaluate</button>
  </form>

  <div id="result" class="mt-5 text-center"></div>
  <div id="failures" class="mt-3"></div>

</div>

<script src="app.js"></script>
</body>
</html>
