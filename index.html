  <meta charset="UTF-8">
  <title>Can Your AI Survive an Audit?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: Inter, Arial, sans-serif;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 700;
    }

    .hero p {
      color: #9ca3af;
      margin-top: 10px;
    }

    .badge-custom {
      background: #1f2937;
      border: 1px solid #374151;
      padding: 6px 12px;
      margin: 4px;
      border-radius: 20px;
      display: inline-block;
      font-size: 13px;
    }

    .card {
      border-radius: 14px;
      background: #111827;
      border: 1px solid #374151;
    }

    label {
      color: #f9fafb;
      font-weight: 600;
    }

    select {
      background-color: #020617 !important;
      color: #f9fafb !important;
      border: 1px solid #4b5563 !important;
      padding: 10px;
    }

    select:focus {
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    .pass { color: #22c55e; }
    .warn { color: #facc15; }
    .fail { color: #ef4444; }

    .cta-box {
      background: #020617;
      border: 1px solid #374151;
      padding: 20px;
      border-radius: 10px;
    }

    .alert-danger {
  background: rgba(239,68,68,0.1);
  border: 1px solid #ef4444;
  color: #fca5a5;
}

h5 { color: #e5e7eb !important; }
.progress { background-color: #374151 !important; }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <p class="mt-3 small text-secondary">
  Built by Horizon Labs — Deterministic AI Systems
  </p>
  <h1>Can Your AI Survive an Audit?</h1>
  <p>Most AI systems work. Very few can defend their decisions.</p>

  <div class="mt-3">
    <span class="badge-custom">Auditability</span>
    <span class="badge-custom">Determinism</span>
    <span class="badge-custom">Replayability</span>
    <span class="badge-custom">Boundary Control</span>
  </div>
</div>

<!-- TOOL -->
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-lg">
        <div class="card-body">

          <form onsubmit="event.preventDefault(); runAudit();">

            <div class="mb-4">
              <label>Workflow Type</label>
              <select class="form-select" id="workflow">
                <option value="" selected disabled>Select Workflow</option>
                <option value="POS_TRANSACTION">POS Transaction</option>
                <option value="FIELD_OPERATIONS">Field Operations</option>
                <option value="PAYMENT_PROCESSING">Payment Processing</option>
                <option value="CUSTOM">Custom Workflow</option>
              </select>
            </div>

            <p class="small text-secondary text-center">
              Answer all questions to evaluate system risk
            </p>

            <div class="mb-4">
              <label>1. Can you replay a decision exactly?</label>
              <select class="form-select" id="replay">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
              <label>2. Same input always gives same output?</label>
              <select class="form-select" id="determinism">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
              <label>3. Is decision ownership clearly defined?</label>
              <select class="form-select" id="ownership">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
              <label>4. Are authority boundaries enforced?</label>
              <select class="form-select" id="boundary">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
              <label>5. Does failure keep system state safe?</label>
              <select class="form-select" id="failure">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
              <label>6. Same request executes only once?</label>
              <select class="form-select" id="idempotency">
                <option value="" selected disabled>Select</option>
                <option value="YES">Yes</option>
                <option value="PARTIAL">Partial</option>
                <option value="NO">No</option>
              </select>
            </div>

            <div class="mb-4">
  <label>7. Was the input state valid and complete at decision time?</label>
  <select class="form-select" id="state_validity">
    <option value="" selected disabled>Select</option>
    <option value="YES">Yes</option>
    <option value="PARTIAL">Partial</option>
    <option value="NO">No</option>
  </select>
</div>

<div class="mb-4">
  <label>8. Was the system authorized to act on that state at that moment?</label>
  <select class="form-select" id="authority_validity">
    <option value="" selected disabled>Select</option>
    <option value="YES">Yes</option>
    <option value="PARTIAL">Partial</option>
    <option value="NO">No</option>
  </select>
</div>

<div class="mb-4">
  <label>9. Can the state be traced to a continuous, origin-preserved record?</label>
  <select class="form-select" id="state_continuity">
    <option value="" selected disabled>Select</option>
    <option value="YES">Yes</option>
    <option value="PARTIAL">Partial</option>
    <option value="NO">No</option>
  </select>
</div>

            <button type="button" class="btn btn-primary w-100 fw-bold" onclick="runAudit()">
              Evaluate System Risk
            </button>

          </form>

          <div id="result" class="mt-4 text-center"></div>
          <div id="failures" class="mt-3"></div>

        </div>
      </div>

      <!-- CTA -->
      <div class="cta-box text-center mt-5">
        <p class="mb-2 text-secondary">Think this test is flawed?</p>
        <a href="https://github.com/Horizon-Labs-Building-AI-Systems/can-your-ai-system-survive-audit.git"
           target="_blank"
           class="btn btn-outline-warning">
          Improve This Test on GitHub
        </a>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
